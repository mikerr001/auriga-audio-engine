kind = "web"
previewPath = "/"
title = "Auriga Audio Engine"
version = "1.0.0"
id = "artifacts/auriga-audio-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22992

[services.development]
run = "pnpm --filter @workspace/auriga-audio-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/auriga-audio-engine", "run", "build" ]
publicDir = "artifacts/auriga-audio-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22992"
BASE_PATH = "/"
